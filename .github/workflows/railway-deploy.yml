name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway Redeploy via API
        run: |
          RESPONSE=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { serviceInstanceRedeploy(environmentId: \"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\", serviceId: \"${{ secrets.RAILWAY_SERVICE_ID }}\" ) }"
            }')
          echo "Response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"errors"'; then
            echo "Erro na API do Railway"
            exit 1
          fi
          echo "Redeploy disparado com sucesso!"
