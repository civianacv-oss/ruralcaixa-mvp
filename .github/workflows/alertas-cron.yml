name: Alertas Diários — RuralCaixa

# Executa todos os dias às 10h00 UTC (07h00 BRT / horário de Brasília)
# O Railway usa UTC; BRT = UTC-3, portanto 10h UTC = 07h BRT
on:
  schedule:
    - cron: "0 10 * * *"
  # Permite disparar manualmente pelo GitHub Actions UI
  workflow_dispatch:
    inputs:
      modulo:
        description: "Módulo específico (deixe vazio para todos)"
        required: false
        default: ""

jobs:
  alertas:
    name: Processar alertas
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      BASE_URL: https://ruralcaixa-mvp-production.up.railway.app

    steps:
      - name: 🐷 Alertas Suínos
        if: ${{ github.event.inputs.modulo == '' || github.event.inputs.modulo == 'suino' }}
        run: |
          echo "Processando alertas suínos..."
          curl -s -o /tmp/suino.json -w "HTTP %{http_code}" \
            -X POST "$BASE_URL/suino/processar-alertas" \
            -H "Content-Type: application/json"
          echo ""
          cat /tmp/suino.json

      - name: 🐄 Alertas Bovinos
        if: ${{ github.event.inputs.modulo == '' || github.event.inputs.modulo == 'bovino' }}
        run: |
          echo "Processando alertas bovinos..."
          curl -s -o /tmp/bovino.json -w "HTTP %{http_code}" \
            -X POST "$BASE_URL/bovino/processar-alertas" \
            -H "Content-Type: application/json"
          echo ""
          cat /tmp/bovino.json

      - name: 🐑 Alertas Ovinos
        if: ${{ github.event.inputs.modulo == '' || github.event.inputs.modulo == 'ovino' }}
        run: |
          echo "Processando alertas ovinos..."
          curl -s -o /tmp/ovino.json -w "HTTP %{http_code}" \
            -X POST "$BASE_URL/ovino/processar-alertas" \
            -H "Content-Type: application/json"
          echo ""
          cat /tmp/ovino.json

      - name: 🐐 Alertas Caprinos
        if: ${{ github.event.inputs.modulo == '' || github.event.inputs.modulo == 'caprino' }}
        run: |
          echo "Processando alertas caprinos..."
          curl -s -o /tmp/caprino.json -w "HTTP %{http_code}" \
            -X POST "$BASE_URL/caprino/processar-alertas" \
            -H "Content-Type: application/json"
          echo ""
          cat /tmp/caprino.json

      - name: 🌾 Alertas Agricultura
        if: ${{ github.event.inputs.modulo == '' || github.event.inputs.modulo == 'agricultura' }}
        run: |
          echo "Processando alertas agricultura..."
          curl -s -o /tmp/agricultura.json -w "HTTP %{http_code}" \
            -X POST "$BASE_URL/agricultura/processar-alertas" \
            -H "Content-Type: application/json"
          echo ""
          cat /tmp/agricultura.json

      - name: 🌴 Alertas Açaí
        if: ${{ github.event.inputs.modulo == '' || github.event.inputs.modulo == 'acai' }}
        run: |
          echo "Processando alertas açaí..."
          curl -s -o /tmp/acai.json -w "HTTP %{http_code}" \
            -X POST "$BASE_URL/acai/processar-alertas" \
            -H "Content-Type: application/json"
          echo ""
          cat /tmp/acai.json

      - name: 🐟 Alertas Piscicultura
        if: ${{ github.event.inputs.modulo == '' || github.event.inputs.modulo == 'piscicultura' }}
        run: |
          echo "Processando alertas piscicultura..."
          curl -s -o /tmp/piscicultura.json -w "HTTP %{http_code}" \
            -X POST "$BASE_URL/piscicultura/processar-alertas" \
            -H "Content-Type: application/json"
          echo ""
          cat /tmp/piscicultura.json

      - name: 📋 Resumo
        if: always()
        run: |
          echo "=== Resumo dos alertas ==="
          for f in suino bovino ovino caprino agricultura acai piscicultura; do
            if [ -f /tmp/$f.json ]; then
              echo "[$f] $(cat /tmp/$f.json)"
            fi
          done
