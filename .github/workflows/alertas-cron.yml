name: Alertas Cron

on:
  schedule:
    # Executar às 09:00 e 17:00 UTC (06:00 e 14:00 Brasília)
    - cron: '0 9,17 * * *'
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

jobs:
  monitor-qualidade-agua:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4
        
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary
          
      - name: 🧪 Executar Monitor de Amônia/Nitrito
        run: |
          python scripts/monitor_amonia_nitrito.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          
      - name: 📱 Instalar dependência HTTP
        run: pip install requests
          
      - name: 💬 Enviar Alertas WhatsApp (Críticos)
        run: |
          python scripts/enviar_alertas_whatsapp.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
          WHATSAPP_TEMPLATE_NAME: "alerta_piscicultura"
          DRY_RUN: "0" # Mude para "1" para testar sem enviar de fato
